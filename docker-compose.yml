version: '3.8'

services:
  db:
    image: mysql:8.0
    container_name: ideathon_mysql
    restart: always
    environment:
      MYSQL_DATABASE: ideathon_db
      MYSQL_ROOT_PASSWORD: root
    ports:
      # Map to host port 3307 to avoid conflict with local MySQL on port 3306
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s

  backend:
    build: .
    container_name: ideathon_backend
    restart: always
    ports:
      - "8000:8000"
    volumes:
      - ./uploads:/app/uploads
    env_file:
      - .env
    environment:
      # Connects to the database container on port 3306
      - DATABASE_URL=mysql+pymysql://root:root@db:3306/ideathon_db
      - PORT=8000
    depends_on:
      db:
        condition: service_healthy

volumes:
  mysql_data: