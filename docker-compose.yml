version: '3.8'

services:
  db:
    image: mysql:8.0
    container_name: ideathon_mysql
    restart: always
    environment:
      # Reads values dynamically from your .env file
      MYSQL_DATABASE: ${DB_NAME}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
    ports:
      # Mapped to host port 3307 to prevent port conflicts with local MySQL running on port 3306
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s

  backend:
    build: .
    container_name: ideathon_backend
    restart: always
    ports:
      - "8000:8000"
    volumes:
      - ./uploads:/app/uploads
    env_file:
      - .env
    environment:
      # Dynamically builds connection URL pointing to the "db" container with the credentials from your .env
      - DATABASE_URL=mysql+pymysql://root:${DB_ROOT_PASSWORD}@db:3306/${DB_NAME}
      - PORT=8000
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started

  redis:
    image: redis:7-alpine
    container_name: ideathon_redis
    restart: always
    # Exposing no ports to host keeps the Redis instance completely secure within the Docker network.

  celery_worker:
    build: .
    container_name: ideathon_celery
    restart: always
    command: celery -A app.core.celery_app worker --loglevel=info
    volumes:
      - ./uploads:/app/uploads
    env_file:
      - .env
    environment:
      - DATABASE_URL=mysql+pymysql://root:${DB_ROOT_PASSWORD}@db:3306/${DB_NAME}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started

volumes:
  mysql_data: